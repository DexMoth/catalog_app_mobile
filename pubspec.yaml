name: catalog_app_mobile
description: "Мобильное приложение для каталогизации вещей"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  dio: ^5.4.2+1
  cupertino_icons: ^1.0.8
  camera: 0.11.0
  path_provider: ^2.1.5
  path: 1.9.0
  image_picker: 1.0.5
  mocktail: ^1.0.4
  tesseract_ocr: ^0.5.0
  google_mlkit_image_labeling: ^0.14.1
  fl_chart: 0.69.0  # графики
  flutter_local_notifications: ^17.0.0 #  для уведомлений
  timezone: ^0.9.2
  flutter_timezone: ^1.0.0  # локальный часовой пояс
  shared_preferences: ^2.2.0 #для хранения пар ключ-значение
  app_settings: ^5.1.0 # для открытия настроек

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/tessdata_config.json
    - assets/tessdata/